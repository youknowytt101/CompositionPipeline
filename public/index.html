<!doctype html>
<html lang="zh-CN" class="sl-theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      body > canvas {
        display: block;
        position: fixed;
        top: 0;
        left: var(--side-panel-width);
        width: calc(100vw - var(--side-panel-width) - var(--right-panel-width));
        height: 100vh;
      }

      :root {
        --side-panel-width: 280px;
        --right-panel-width: var(--side-panel-width);
        --right-panel-collapsed-width: 52px;
        --editor-panel-bg: rgba(38, 38, 38, 0.96);
        --editor-panel-border: rgba(255, 255, 255, 0.12);
        --camera-preview-border-width: 3px;
        --runtime-aspect-ratio: calc(16 / 9);
        --sl-border-radius-medium: 6px;
        --sl-focus-ring-color: rgba(255, 255, 255, 0.5);
      }

      .left-ui-panel,
      .right-ui-panel {
        position: fixed;
        top: 0;
        bottom: 0;
        z-index: 12;
        box-sizing: border-box;
        background: var(--editor-panel-bg);
      }

      .left-ui-panel {
        left: 0;
        width: var(--side-panel-width);
        border-right: 1px solid var(--editor-panel-border);
      }

      body.is-right-panel-collapsed {
        --right-panel-width: var(--right-panel-collapsed-width);
      }

      .settings-panel {
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-sizing: border-box;
        width: 100%;
        padding: 14px;
        color: rgba(255, 255, 255, 0.88);
      }

      .settings-heading {
        margin: 0;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.2;
      }

      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .settings-label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
      }

      .settings-value {
        color: rgba(255, 255, 255, 0.92);
        font-variant-numeric: tabular-nums;
      }

      .camera-range {
        width: 100%;
        accent-color: #ffffff;
      }

      .aspect-preset-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .aspect-preset-button {
        height: 30px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.78);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .aspect-preset-button.is-active {
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
      }

      .right-ui-panel {
        right: 0;
        width: var(--right-panel-width);
        border-left: 1px solid var(--editor-panel-border);
      }

      .right-panel-rail {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 1;
        box-sizing: border-box;
        width: var(--right-panel-collapsed-width);
        padding: 8px 6px;
        border-right: 1px solid var(--editor-panel-border);
        background: rgba(32, 32, 32, 0.9);
      }

      .right-panel-toggle,
      .right-panel-toggle::part(base) {
        width: 38px;
        height: 38px;
        border-radius: 6px;
      }

      .right-panel-toggle::part(base) {
        color: rgba(255, 255, 255, 0.78);
      }

      .right-panel-toggle::part(base):hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }

      .camera-preview-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px 10px 10px calc(var(--right-panel-collapsed-width) + 10px);
      }

      body.is-right-panel-collapsed .camera-preview-list {
        display: none;
      }

      .camera-preview-card {
        width: 100%;
        aspect-ratio: var(--preview-aspect-ratio, var(--runtime-aspect-ratio));
        box-sizing: border-box;
        overflow: hidden;
        border: var(--camera-preview-border-width) solid #ff4d4d;
        background: #2b2b2b;
      }

      .camera-preview-card canvas {
        display: block;
        width: calc(100% + var(--camera-preview-border-width) * 2);
        height: calc(100% + var(--camera-preview-border-width) * 2);
        margin: calc(var(--camera-preview-border-width) * -1);
      }

      .asset-toolbar,
      .transform-toolbar {
        position: fixed;
        left: calc(var(--side-panel-width) + 12px);
        z-index: 13;
        display: flex;
        flex-direction: row;
        gap: 4px;
        padding: 5px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(36, 36, 36, 0.74);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(18px);
      }

      .asset-toolbar {
        top: 12px;
      }

      .transform-toolbar {
        top: 72px;
      }

      .transform-toolbar[hidden] {
        display: none;
      }

      .camera-speed-control {
        position: fixed;
        top: 12px;
        left: calc(var(--side-panel-width) + 338px);
        z-index: 13;
        display: flex;
        align-items: center;
        box-sizing: border-box;
        height: 52px;
        padding: 5px 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(36, 36, 36, 0.74);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        color: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(18px);
      }

      .camera-speed-field {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .camera-speed-label {
        font-size: 12px;
        font-weight: 650;
        line-height: 1;
      }

      .camera-speed-input {
        width: 56px;
        height: 32px;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.22);
        color: rgba(255, 255, 255, 0.92);
        padding: 0 8px;
        font: inherit;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .tool-button,
      .drag-preview {
        width: 40px;
        height: 40px;
        border-radius: 6px;
      }

      .tool-button::part(base) {
        width: 40px;
        height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        color: rgba(255, 255, 255, 0.7);
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          transform 120ms ease;
      }

      .tool-button::part(base):hover {
        border-color: rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.98);
      }

      .tool-button::part(base):active {
        transform: translateY(1px);
      }

      .asset-button::part(base) {
        cursor: grab;
      }

      .asset-button::part(base):active {
        cursor: grabbing;
      }

      .tool-button.is-active::part(base) {
        border-color: rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
      }

      .tool-button::part(base),
      .drag-preview sl-icon {
        font-size: 21px;
      }

      .drag-preview svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .drag-preview {
        position: fixed;
        z-index: 20;
        display: none;
        place-items: center;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(36, 36, 36, 0.74);
        color: rgba(255, 255, 255, 0.88);
        transform: translate(-50%, -50%);
        backdrop-filter: blur(18px);
      }

      .drag-preview.is-visible {
        display: grid;
      }

      .play-viewport-frame {
        position: fixed;
        top: 50%;
        right: var(--right-panel-width);
        left: var(--side-panel-width);
        z-index: 8;
        display: none;
        width: min(
          calc(100vw - var(--side-panel-width) - var(--right-panel-width) - 48px),
          calc((100vh - 48px) * var(--runtime-aspect-ratio))
        );
        aspect-ratio: var(--runtime-aspect-ratio);
        margin: 0 auto;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.44);
        border-radius: 8px;
        box-shadow:
          0 0 0 100vmax rgba(0, 0, 0, 0.62),
          0 18px 48px rgba(0, 0, 0, 0.26),
          inset 0 0 0 1px rgba(0, 0, 0, 0.3);
        transform: translateY(-50%);
      }

      body.is-playing .play-viewport-frame {
        display: block;
      }

    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <script type="module" src="/__dev-reload.js"></script>
  </head>
  <body>
    <aside id="left-ui-panel" class="left-ui-panel" aria-label="left tools">
      <section id="camera-settings-panel" class="settings-panel" aria-label="camera settings">
        <h2 class="settings-heading">Camera</h2>

        <label class="settings-field" for="camera-fov-range">
          <span class="settings-label-row">
            <span>FOV</span>
            <output id="camera-fov-value" class="settings-value" for="camera-fov-range">60</output>
          </span>
          <input
            id="camera-fov-range"
            class="camera-range"
            type="range"
            min="20"
            max="100"
            step="1"
            value="60"
          />
        </label>

        <div class="settings-field">
          <div class="settings-label-row">
            <span>Runtime Aspect</span>
            <span id="runtime-aspect-value" class="settings-value">16:9</span>
          </div>
          <div class="aspect-preset-grid" aria-label="runtime aspect presets">
            <button class="aspect-preset-button is-active" type="button" data-aspect-preset="16:9">16:9</button>
            <button class="aspect-preset-button" type="button" data-aspect-preset="4:3">4:3</button>
            <button class="aspect-preset-button" type="button" data-aspect-preset="1:1">1:1</button>
            <button class="aspect-preset-button" type="button" data-aspect-preset="9:16">9:16</button>
          </div>
        </div>
      </section>
    </aside>

    <div id="asset-toolbar" class="asset-toolbar" aria-label="asset tools">
      <sl-tooltip content="Cube" placement="right">
        <sl-icon-button class="tool-button asset-button" name="box" data-asset="cube" label="Cube"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Sphere" placement="right">
        <sl-icon-button class="tool-button asset-button" name="globe2" data-asset="sphere" label="Sphere"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Character" placement="right">
        <sl-icon-button class="tool-button asset-button" name="person-standing" data-asset="character" label="Character"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Camera" placement="right">
        <sl-icon-button class="tool-button" name="camera-video" data-system-tool="camera" label="Camera"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Light" placement="right">
        <sl-icon-button class="tool-button asset-button" name="lightbulb" data-asset="sun-light" label="Light"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Run" placement="right">
        <sl-icon-button class="tool-button" name="play-fill" data-system-tool="run" label="Run"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Road" placement="right">
        <sl-icon-button class="tool-button" name="map" data-system-tool="road" label="Road"></sl-icon-button>
      </sl-tooltip>
    </div>

    <div id="camera-speed-control" class="camera-speed-control" aria-label="camera flight speed">
      <label class="camera-speed-field" for="camera-speed-input">
        <span class="camera-speed-label">Speed</span>
        <input id="camera-speed-input" class="camera-speed-input" type="number" min="1" max="80" step="1" value="7" />
      </label>
    </div>

    <div id="transform-toolbar" class="transform-toolbar" aria-label="transform tools" hidden>
      <sl-tooltip content="Move" placement="right">
        <sl-icon-button class="tool-button transform-button is-active" name="arrows-move" data-transform-mode="translate" label="Move"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Rotate" placement="right">
        <sl-icon-button class="tool-button transform-button" name="arrow-clockwise" data-transform-mode="rotate" label="Rotate"></sl-icon-button>
      </sl-tooltip>
      <sl-tooltip content="Scale" placement="right">
        <sl-icon-button class="tool-button transform-button" name="arrows-angle-expand" data-transform-mode="scale" label="Scale"></sl-icon-button>
      </sl-tooltip>
    </div>

    <div id="drag-preview" class="drag-preview" aria-hidden="true"></div>
    <div id="play-viewport-frame" class="play-viewport-frame" aria-hidden="true"></div>
    <aside id="right-ui-panel" class="right-ui-panel" aria-label="right tools">
      <div id="right-panel-rail" class="right-panel-rail" aria-label="right panel controls">
        <sl-tooltip content="Collapse panel" placement="left">
          <sl-icon-button
            id="right-panel-toggle"
            class="right-panel-toggle"
            name="chevron-right"
            data-panel-tool="toggle-right-panel"
            label="Collapse right panel"
            aria-expanded="true"
          ></sl-icon-button>
        </sl-tooltip>
      </div>
      <div id="camera-preview-list" class="camera-preview-list" aria-label="captured camera previews"></div>
    </aside>
    <script type="module" src="/app.js?v=road-drawing-pointer"></script>
  </body>
</html>
