<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      canvas {
        display: block;
      }

      .asset-toolbar,
      .transform-toolbar {
        position: fixed;
        left: 12px;
        z-index: 10;
        display: flex;
        gap: 6px;
        padding: 6px;
        border: 1px solid rgba(0, 0, 0, 0.14);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
      }

      .asset-toolbar {
        top: 12px;
      }

      .transform-toolbar {
        top: 72px;
      }

      .transform-toolbar[hidden] {
        display: none;
      }

      .asset-button,
      .transform-button,
      .drag-preview {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        color: #111111;
      }

      .asset-button,
      .transform-button {
        display: grid;
        place-items: center;
        padding: 0;
        border: 1px solid rgba(0, 0, 0, 0.18);
        background: #ffffff;
        touch-action: none;
      }

      .asset-button {
        cursor: grab;
      }

      .asset-button:active {
        cursor: grabbing;
        background: #f2f2f2;
      }

      .transform-button {
        cursor: pointer;
      }

      .transform-button.is-active {
        border-color: #111111;
        background: #e9e9e9;
      }

      .asset-button svg,
      .transform-button svg,
      .drag-preview svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .drag-preview {
        position: fixed;
        z-index: 20;
        display: none;
        place-items: center;
        pointer-events: none;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.92);
        transform: translate(-50%, -50%);
      }

      .drag-preview.is-visible {
        display: grid;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="/__dev-reload.js"></script>
  </head>
  <body>
    <div id="asset-toolbar" class="asset-toolbar" aria-label="asset tools">
      <button class="asset-button" type="button" data-asset="cube" aria-label="cube" title="Cube">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 4.5 7.2 12 11.5l7.5-4.3L12 3Z" />
          <path d="M4.5 7.2v8.6L12 20l7.5-4.2V7.2" />
          <path d="M12 11.5V20" />
        </svg>
      </button>
      <button class="asset-button" type="button" data-asset="sphere" aria-label="sphere" title="Sphere">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="8" />
          <path d="M4 12h16" />
          <path d="M12 4c2.2 2.4 3.3 5.1 3.3 8S14.2 17.6 12 20" />
          <path d="M12 4c-2.2 2.4-3.3 5.1-3.3 8S9.8 17.6 12 20" />
        </svg>
      </button>
      <button class="asset-button" type="button" data-asset="character" aria-label="character" title="Character">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="5.5" r="2.3" />
          <path d="M12 8v6" />
          <path d="M8 11h8" />
          <path d="m12 14-3.5 5" />
          <path d="m12 14 3.5 5" />
        </svg>
      </button>
    </div>

    <div id="transform-toolbar" class="transform-toolbar" aria-label="transform tools" hidden>
      <button class="transform-button is-active" type="button" data-transform-mode="translate" aria-label="move" title="Move">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v18" />
          <path d="m8 7 4-4 4 4" />
          <path d="m8 17 4 4 4-4" />
          <path d="M3 12h18" />
          <path d="m7 8-4 4 4 4" />
          <path d="m17 8 4 4-4 4" />
        </svg>
      </button>
      <button class="transform-button" type="button" data-transform-mode="rotate" aria-label="rotate" title="Rotate">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 11a8 8 0 0 0-13.6-5.7" />
          <path d="M4 5v5h5" />
          <path d="M4 13a8 8 0 0 0 13.6 5.7" />
          <path d="M20 19v-5h-5" />
        </svg>
      </button>
      <button class="transform-button" type="button" data-transform-mode="scale" aria-label="scale" title="Scale">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 14v6h6" />
          <path d="M20 10V4h-6" />
          <path d="m14 10 6-6" />
          <path d="m4 20 6-6" />
        </svg>
      </button>
    </div>

    <div id="drag-preview" class="drag-preview" aria-hidden="true"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
